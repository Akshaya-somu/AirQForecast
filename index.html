<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title & Basic Meta -->
    <title>AirQForecast - Urban Air Quality Monitoring Dashboard</title>
    <meta
      name="description"
      content="Real-time air quality monitoring and AQI forecasting dashboard. Track pollutant levels, view trends, and receive alerts for unhealthy air conditions."
    />
    <meta name="author" content="AirQForecast" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:title" content="AirQForecast - Air Quality Monitoring" />
    <meta
      property="og:description"
      content="Monitor air quality index and pollutant levels in real-time"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AirQForecast" />
    <meta
      name="twitter:description"
      content="Real-time AQI monitoring and air quality forecasting dashboard"
    />
    <meta name="twitter:image" content="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
